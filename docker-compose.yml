services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind
      POSTGRES_DB: documind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      VECTOR_STORE: pgvector
      DATABASE_URL: postgresql://documind:documind@db:5432/documind
    depends_on:
      - db

  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
